{% extends "base.html" %}

{% block title %}Change Password | {{ app_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="row justify-content-center w-100">
        <div class="col-lg-7">
            <div class="glass-panel p-4 p-lg-5">
                <span class="eyebrow"><i class="bi bi-key"></i> Security Update</span>
                <h1 class="page-title mt-3">Change your password</h1>
                <p class="page-subtitle">Use a new password that is stronger and different from your current one.</p>
                <form method="POST" class="mt-4">
                    <div class="mb-3">
                        <label class="form-label">Current password</label>
                        <input type="password" name="current_password" class="form-control" placeholder="Enter current password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New password</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm new password</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                    </div>
                    <div class="quick-actions mt-4">
                        <button type="submit" class="btn-bank">Update Password</button>
                        <a href="{{ url_for('profile') }}" class="btn-bank-outline">Back to Profile</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
